<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocol - Obsidian Cipher Systems</title>
    <style>
        @font-face {
            font-family: "Terminess";
            src: url("/fonts/terminess.woff2") format("woff2");
            font-display: swap;
        }

        :root {
            font-family: "Terminess", monospace;
            background-color: #000a00;
            color: #00ff41;
            line-height: 1.6;
        }

        body {
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #001a00 0%, #000500 100%);
            overflow: hidden;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    rgba(18, 16, 16, 0) 50%,
                    rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .content-box {
            max-width: 600px;
            border: 1px solid #00ff41;
            padding: 3rem;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tagline {
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .policy-text {
            font-size: 1.1rem;
            border-left: 2px solid #00ff41;
            padding-left: 1.5rem;
        }

        .back-link {
            margin-top: 3rem;
            display: inline-block;
            color: #00ff41;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #00ff41;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #00ff41;
            color: #000;
        }

        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(0, 255, 65, 0.1);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="content-box">
        <div class="glitch-overlay"></div>
        <h1>Directive 0x00: The Protocol</h1>
        <p class="tagline">As in the Code, so in the Void.</p>
        <div class="policy-text">
            The laboratory is non-local; manifest your intent from any node on the
            grid where focus is absolute. Silence is our primary cipher, and the
            transmutation of code is our only ritual.
        </div>
        <a href="/" class="back-link">← Return to Terminal</a>
    </div>
</body>

</html>
